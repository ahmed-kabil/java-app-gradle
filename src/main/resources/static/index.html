<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradle Java App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Deep, dark radial background - removes the 'white' feel */
            background: radial-gradient(circle at center, #10121a 0%, #050508 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 3rem;
            /* Darker glassmorphism */
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            /* Subtle blue-ish border glow */
            border: 1px solid rgba(0, 212, 255, 0.1);
            box-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            /* Clean Cyan to Deep Blue gradient */
            background: linear-gradient(90deg, #00d4ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        p {
            font-size: 1.1rem;
            /* Muted slate blue color for better contrast on dark */
            color: #64748b;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 15px;
            /* Darker badge background to prevent brightness */
            background: rgba(0, 212, 255, 0.05);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 50px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from Java App</h1>
        <p>Your Spring Boot backend is active.</p>
        <p><i style="color: #0072ff;">build by gradle</i></p>
        <div class="badge">Powered by OpenJDK 17</div>
    </div>
</body>
</html>
